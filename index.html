<!DOCTYPE html>
<html lang = "en">
  <head>
    <meta charset = "UTF-8">
    <meta name="viewport" content ="width=device-width, initial-scale=1.0" />
    <title> Campus Tracker </title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  </head>
  <body> 
    <header>

        <img src="/icon/Logo.png" alt="">

        <p>UWISpots</p>

        <nav id="navbar">
            <a href="#home"><i class="bi bi-house"></i> Home</a>
            <a href="#map"><i class="bi bi-map"></i> Map</a>
            <a href="#about"><i class="bi bi-info-circle"></i> About</a>
            <a href="#login" id="login"> Login</a>
        </nav>

    </header>
    
    <main>
        <aside id="master">
           
            <ul>
                <li><i class="bi bi-bookmark"></i>Favorites</li>
                <li><i class="bi bi-cup-straw"></i>Food and Drink</li>
                <li><i class="bi bi-book"></i>Study Spots</li>
                <li><i class="bi bi-controller"></i></i>Recreation
                </li>
            </ul>
        </aside>

        <div id="map">
            <gmp-map center="10.641919556440756, -61.39944669632869" zoom="18" map-id="DEMO_MAP_ID" ><button id="AddToFavs">Test</button></gmp-map>
        </div>

        <div id="detail">
            <section id="FavsHeader">
                <h2> Favorites</h2>
            </section>

            <section id="FavsList">
                <div class="FavItem">
                    <h3>Spot 1</h3>
                    <p>No Notes.</p>
                    <br>
                    <p style="font-size: 13px;">Saved on 10/03/2026</p>
                </div>
            </section>
                
                <!-- <p id="location-name">Select a location on the map to see details here.</p> -->
        </div>

    </main>
    <div id="map"></div>
    <script src="app.js"> </script> 
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDVprZOHhVX2_cNEBhths5QVk4JZLKvR-c"></script> 
  </body>
</html>
